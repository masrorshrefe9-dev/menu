<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خارنگەها قەدش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #0b0b0b; --card: #161616; }
        body { background-color: var(--bg); color: white; font-family: 'Tahoma', sans-serif; margin: 0; padding: 0; }
        
        /* Lang Bar */
        .lang-bar { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 2000; }
        .lang-btn { background: var(--card); border: 1px solid var(--main); color: var(--main); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .header { text-align: center; padding: 50px 20px; border-bottom: 4px solid var(--main); }
        h1 { color: var(--main); margin: 0; }

        .nav-scroll { background: #111; padding: 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid #222; }
        .cat-item { background: var(--card); border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; white-space: nowrap; }
        .cat-item.active { background: var(--main); color: black; }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 120px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #252525; position: relative; }
        .price { position: absolute; top: 10px; left: 10px; background: var(--main); color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .info { padding: 15px; text-align: center; }
        .add-btn { width: 100%; background: var(--main); border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Cart UI */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 3px solid var(--main); padding: 20px; display: none; justify-content: space-between; align-items: center; z-index: 1000; }
        .order-now { background: #25d366; color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn" onclick="changeLang('ku')">کوردی</button>
        <button class="lang-btn" onclick="changeLang('ar')">عربي</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="header">
        <h1 id="main-title">خارنگەها قەدش</h1>
        <p id="slogan-text">بۆ خۆشترین خارن ب تاما مالێ</p>
    </div>

    <div class="nav-scroll">
        <div class="cat-item active" id="cat-all" onclick="filter('all')">هەمی</div>
        <div class="cat-item" id="cat-home" onclick="filter('home')">خارنێن مالێ</div>
    </div>

    <div class="container" id="menu-grid">
        <div class="card" data-type="home">
            <div class="price">8,000 IQD</div>
            <img src="https://via.placeholder.com/300x200" style="width:100%">
            <div class="info">
                <h3 class="food-name" data-ku="بریانی" data-ar="برياني" data-en="Biryani">بریانی</h3>
                <p class="food-desc" data-ku="بریانی ب گۆشتێ فڕێش" data-ar="برياني باللحم الطازج" data-en="Biryani with fresh meat">بریانی ب گۆشتێ فڕێش</p>
                <button class="add-btn order-text" onclick="addToCart(this)">زێدە بکە بۆ سەبەتێ</button>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cart-ui">
        <div><span id="cart-label">تشتێن هەڵبژارتی:</span> <span id="cart-count">0</span></div>
        <a href="#" id="wa-link" class="order-now">Order on WhatsApp</a>
    </div>

    <script>
        let cart = [];
        let currentLang = 'ku';
        const waNumber = "964750XXXXXXX"; // ژمارا واتی ل ڤێرێ بگۆهۆڕە

        function addToCart(btn) {
            const card = btn.closest('.card');
            const name = card.querySelector('.food-name').getAttribute('data-' + currentLang);
            const price = 8000; // دشێی بۆ هەر خارنەکێ نرخەکی جودا دانی
            
            cart.push({name, price});
            document.getElementById('cart-ui').style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length;
            updateWALink();
        }

        function updateWALink() {
            let text = currentLang === 'ku' ? "سڵاڤ، ئەز دێ ڤان تشتان داوا کەم:" : 
                       currentLang === 'ar' ? "مرحبا، أود طلب هذه الأصناف:" : "Hello, I want to order these items:";
            text += "%0A";
            cart.forEach(item => { text += `- ${item.name}%0A`; });
            document.getElementById('wa-link').href = `https://wa.me/${waNumber}?text=${text}`;
        }

        function changeLang(lang) {
            currentLang = lang;
            const title = document.getElementById('main-title');
            const slogan = document.getElementById('slogan-text');
            const foodNames = document.querySelectorAll('.food-name');
            const foodDescs = document.querySelectorAll('.food-desc');
            const orderTexts = document.querySelectorAll('.order-text');

            if(lang === 'ar') {
                document.body.dir = "rtl";
                title.innerText = "مطعم قدش";
                slogan.innerText = "لأشهى المأكولات بنكهة البيت";
                document.getElementById('cat-all').innerText = "الكل";
                document.getElementById('cat-home').innerText = "أكل بيت";
                document.getElementById('cart-label').innerText = "الأصناف المختارة:";
                orderTexts.forEach(b => b.innerText = "إضافة للسلة");
            } else if(lang === 'en') {
                document.body.dir = "ltr";
                title.innerText = "Qadash Restaurant";
                slogan.innerText = "Best Home-Style Food";
                document.getElementById('cat-all').innerText = "All";
                document.getElementById('cat-home').innerText = "Home Food";
                document.getElementById('cart-label').innerText = "Selected Items:";
                orderTexts.forEach(b => b.innerText = "Add to Basket");
            } else {
                document.body.dir = "rtl";
                title.innerText = "خارنگەها قەدش";
                slogan.innerText = "بۆ خۆشترین خارن ب تاما مالێ";
                document.getElementById('cat-all').innerText = "هەمی";
                document.getElementById('cat-home').innerText = "خارنێن مالێ";
                document.getElementById('cart-label').innerText = "تشتێن هەڵبژارتی:";
                orderTexts.forEach(b => b.innerText = "زێدە بکە بۆ سەبەتێ");
            }

            foodNames.forEach(f => f.innerText = f.getAttribute('data-' + lang));
            foodDescs.forEach(f => f.innerText = f.getAttribute('data-' + lang));
            updateWALink();
        }
    </script>
</body>
</html>
