<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خارنگەها قادش یا فەرمی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --bg: #0b0b0b; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .header { text-align: center; padding: 50px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=500'); background-size: cover; border-bottom: 4px solid var(--primary); }
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: #111; position: sticky; top: 0; z-index: 100; }
        .cat-btn { background: var(--card); border: 1px solid #444; color: white; padding: 8px 20px; border-radius: 20px; white-space: nowrap; }
        .menu-grid { padding: 20px; display: grid; gap: 20px; }
        .item-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .item-img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .item-content { padding: 15px; }
        .price { font-size: 18px; font-weight: bold; color: var(--primary); }
        .footer { text-align: center; padding: 30px; color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍔 مەتعه‌مێ قادش یا جیهانی</h1>
        <p>باشترین خارن ب دەستێ مەسروور شەریف</p>
    </div>
    <div class="categories">
        <div class="cat-btn" style="background:var(--primary); color:black;">هەمی</div>
        <div class="cat-btn">پیتزا</div>
        <div class="cat-btn">بۆڕگەر</div>
        <div class="cat-btn">کەباب</div>
    </div>
    <div class="menu-grid">
        <div class="item-card">
            <img class="item-img" src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500">
            <div class="item-content">
                <h3>بۆڕگەر سپایسی</h3>
                <p style="color:#aaa;">گۆشتێ فرێش، پەنیر، سۆسا تایبەت</p>
                <span class="price">6,500 IQD</span>
            </div>
        </div>
        <div class="item-card">
            <img class="item-img" src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500">
            <div class="item-content">
                <h3>پیتزا قادش</h3>
                <p style="color:#aaa;">سۆسا ئیتاڵی، مۆزارێلا، قارچک</p>
                <span class="price">10,000 IQD</span>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>دیزاین کراوە لایەن مەسروور تەکنیک 🛡️</p>
    </div>
</body>
</html>
