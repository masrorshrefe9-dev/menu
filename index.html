<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خارنگەها قەدش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #0b0b0b; --card: #161616; }
        body { background-color: var(--bg); color: white; font-family: 'Tahoma', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        
        /* Language Bar */
        .lang-bar { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 2000; }
        .lang-btn { background: var(--card); border: 1px solid var(--main); color: var(--main); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Header */
        .header { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800'); background-size: cover; border-bottom: 4px solid var(--main); }
        h1 { font-size: 2.5rem; color: var(--main); margin: 0; }
        .slogan { color: #ccc; margin-top: 10px; }

        /* Navigation */
        .nav-scroll { background: #111; padding: 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid #222; }
        .cat-item { background: var(--card); border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .cat-item.active { background: var(--main); color: black; border-color: var(--main); }

        /* Menu Grid */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 100px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #252525; transition: 0.3s; }
        .img-box { height: 200px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price { position: absolute; top: 10px; left: 10px; background: var(--main); color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .info { padding: 20px; text-align: center; }
        .food-name { margin: 0; font-size: 1.4rem; color: var(--main); }
        .food-desc { color: #aaa; font-size: 0.9rem; margin-top: 8px; }

        /* Footer Phone Bar */
        .footer-contact { position: fixed; bottom: 0; width: 100%; background: var(--main); color: black; padding: 15px; text-align: center; font-weight: bold; z-index: 1000; border-top: 3px solid #000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .footer-contact a { color: black; text-decoration: none; font-size: 1.3rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn" onclick="changeLang('ku')">کوردی</button>
        <button class="lang-btn" onclick="changeLang('ar')">عربي</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="header">
        <h1 id="main-title">خارنگەها قەدش</h1>
        <p class="slogan" id="slogan-text">بۆ خۆشترین خارن ب تاما مالێ</p>
    </div>

    <div class="nav-scroll">
        <div class="cat-item active" id="cat-all" onclick="filter('all')">هەمی</div>
        <div class="cat-item" id="cat-home" onclick="filter('home')">خارنێن مالێ</div>
        <div class="cat-item" id="cat-grill" onclick="filter('grill')">برزانک</div>
        <div class="cat-item" id="cat-nargila" onclick="filter('nargila')">نەرگیلە</div>
    </div>

    <div class="container" id="menu-grid">
        <div class="card" data-type="home">
            <div class="img-box">
                <div class="price">8,000 IQD</div>
                <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500" alt="Biryani">
            </div>
            <div class="info">
                <h3 class="food-name" data-ku="بریانی" data-ar="برياني" data-en="Biryani">بریانی</h3>
                <p class="food-desc" data-ku="بریانی ب گۆشتێ فڕێش" data-ar="برياني باللحم الطازج" data-en="Biryani with fresh meat">بریانی ب گۆشتێ فڕێش</p>
            </div>
        </div>

        <div class="card" data-type="nargila">
            <div class="img-box">
                <div class="price">5,000 IQD</div>
                <img src="https://images.unsplash.com/photo-1527113341617-c0342cd76d75?w=500" alt="Nargila">
            </div>
            <div class="info">
                <h3 class="food-name" data-ku="نەرگیلە" data-ar="نرجيلة" data-en="Hookah">نەرگیلە</h3>
                <p class="food-desc" data-ku="هەمی جۆرێن تێکهەڵ" data-ar="جميع أنواع النكهات" data-en="All mix flavors">هەمی جۆرێن تێکهەڵ</p>
            </div>
        </div>
    </div>

    <div class="footer-contact">
        <span id="call-text">بۆ داواکرنێ تەلەفۆنێ بکە:</span>
        <a href="tel:07501234567">0750 123 45 67</a>
    </div>

    <script>
        function filter(type) {
            const cards = document.querySelectorAll('.card');
            const items = document.querySelectorAll('.cat-item');
            items.forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            
            cards.forEach(card => {
                if(type === 'all' || card.getAttribute('data-type') === type) card.style.display = 'block';
                else card.style.display = 'none';
            });
        }

        function changeLang(lang) {
            const title = document.getElementById('main-title');
            const slogan = document.getElementById('slogan-text');
            const callText = document.getElementById('call-text');
            const foodNames = document.querySelectorAll('.food-name');
            const foodDescs = document.querySelectorAll('.food-desc');

            if(lang === 'ar') {
                document.body.dir = "rtl";
                title.innerText = "مطعم قدش";
                slogan.innerText = "لأشهى المأكولات بنكهة البيت";
                callText.innerText = "للطلب اتصل بنا:";
                document.getElementById('cat-all').innerText = "الكل";
                document.getElementById('cat-home').innerText = "أکل بیت";
                document.getElementById('cat-grill').innerText = "مشاوی";
                document.getElementById('cat-nargila').innerText = "نرجيلة";
            } else if(lang === 'en') {
                document.body.dir = "ltr";
                title.innerText = "Qadash Restaurant";
                slogan.innerText = "Best Home-Style Food";
                callText.innerText = "Call to Order Now:";
                document.getElementById('cat-all').innerText = "All";
                document.getElementById('cat-home').innerText = "Home Food";
                document.getElementById('cat-grill').innerText = "Grill";
                document.getElementById('cat-nargila').innerText = "Hookah";
            } else {
                document.body.dir = "rtl";
                title.innerText = "خارنگەها قەدش";
                slogan.innerText = "بۆ خۆشترین خارن ب تاما مالێ";
                callText.innerText = "بۆ داواکرنێ تەلەفۆنێ بکە:";
                document.getElementById('cat-all').innerText = "هەمی";
                document.getElementById('cat-home').innerText = "خارنێن مالێ";
                document.getElementById('cat-grill').innerText = "برزانک";
                document.getElementById('cat-nargila').innerText = "نەرگیلە";
            }

            foodNames.forEach(f => f.innerText = f.getAttribute('data-' + lang));
            foodDescs.forEach(f => f.innerText = f.getAttribute('data-' + lang));
        }
    </script>
</body>
  </html>
