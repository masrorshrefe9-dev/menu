<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خارنگەها قەدش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #0b0b0b; --card: #161616; --green: #25d366; }
        body { background-color: var(--bg); color: white; font-family: 'Tahoma', sans-serif; margin: 0; padding: 0; }
        
        /* Fixed Headers */
        .lang-bar { background: #000; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 2000; }
        .lang-btn { background: var(--card); border: 1px solid var(--main); color: var(--main); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .header { text-align: center; padding: 40px 20px; border-bottom: 4px solid var(--main); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .open { background: var(--green); color: black; }
        .closed { background: #ff4444; color: white; }

        /* Navigation Scroll */
        .nav-scroll { background: #111; padding: 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid #222; position: sticky; top: 65px; z-index: 1500; }
        .cat-item { background: var(--card); border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .cat-item.active { background: var(--main); color: black; }

        /* Menu Grid */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 150px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #252525; position: relative; }
        .price { position: absolute; top: 10px; left: 10px; background: var(--main); color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .info { padding: 15px; text-align: center; }

        /* Sticky Footer for Contact */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: var(--main); color: black; padding: 15px; text-align: center; font-weight: bold; z-index: 1000; border-top: 3px solid #000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .footer-fixed a { color: black; text-decoration: none; font-size: 1.4rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn" onclick="changeLang('ku')">کوردی</button>
        <button class="lang-btn" onclick="changeLang('ar')">عربي</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="header">
        <div id="status-display" class="status-badge"></div>
        <h1 id="main-title">خارنگەها قەدش</h1>
        <p id="slogan-text">بۆ خۆشترین خارن و ڤەخوارن</p>
    </div>

    <div class="nav-scroll">
        <div class="cat-item active" id="cat-all" onclick="filter('all')">هەمی</div>
        <div class="cat-item" id="cat-home" onclick="filter('home')">خارنێن مالێ</div>
        <div class="cat-item" id="cat-dessert" onclick="filter('dessert')">شرینی</div>
        <div class="cat-item" id="cat-hot" onclick="filter('hot')">ڤەخوارنێن گەرم</div>
        <div class="cat-item" id="cat-cold" onclick="filter('cold')">ڤەخوارنێن سار</div>
        <div class="cat-item" id="cat-nargila" onclick="filter('nargila')">نەرگیلە</div>
    </div>

    <div class="container" id="menu-grid">
        <div class="card" data-type="home">
            <div class="price">8,000 IQD</div>
            <img src="https://via.placeholder.com/300x200" style="width:100%">
            <div class="info"><h3 class="food-name" data-ku="بریانی" data-ar="برياني" data-en="Biryani">بریانی</h3></div>
        </div>

        <div class="card" data-type="dessert">
            <div class="price">4,000 IQD</div>
            <img src="https://via.placeholder.com/300x200" style="width:100%">
            <div class="info"><h3 class="food-name" data-ku="کونافە" data-ar="كنافة" data-en="Kunafa">کونافە</h3></div>
        </div>

        <div class="card" data-type="hot">
            <div class="price">1,000 IQD</div>
            <img src="https://via.placeholder.com/300x200" style="width:100%">
            <div class="info"><h3 class="food-name" data-ku="چای" data-ar="شاي" data-en="Tea">چای</h3></div>
        </div>

        <div class="card" data-type="cold">
            <div class="price">1,500 IQD</div>
            <img src="https://via.placeholder.com/300x200" style="width:100%">
            <div class="info"><h3 class="food-name" data-ku="ئاڤا پرتەقاڵا" data-ar="عصير برتقال" data-en="Orange Juice">ئاڤا پرتەقاڵا</h3></div>
        </div>
    </div>

    <div class="footer-fixed">
        <span id="call-text">بۆ داواکرنێ تەلەفۆنێ بکە:</span>
        <a href="tel:07501234567">0750 123 45 67</a>
    </div>

    <script>
        let currentLang = 'ku';

        function checkStatus() {
            const hour = new Date().getHours();
            const display = document.getElementById('status-display');
            if(hour >= 8 && hour < 23) {
                display.innerText = currentLang === 'ku' ? "● نوکە یا ڤەکری یە" : (currentLang === 'ar' ? "● مفتوح الآن" : "● Open Now");
                display.className = "status-badge open";
            } else {
                display.innerText = currentLang === 'ku' ? "● نوکە یا گرتی یە" : (currentLang === 'ar' ? "● مغلق الآن" : "● Closed Now");
                display.className = "status-badge closed";
            }
        }

        function filter(type) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.card').forEach(c => c.style.display = (type==='all'||c.dataset.type===type)?'block':'none');
        }

        function changeLang(lang) {
            currentLang = lang;
            const title = document.getElementById('main-title');
            const call = document.getElementById('call-text');
            if(lang === 'ar') {
                title.innerText = "مطعم قدش";
                call.innerText = "للطلب اتصل بنا:";
                document.getElementById('cat-all').innerText = "الكل";
                document.getElementById('cat-home').innerText = "أکل بیت";
                document.getElementById('cat-dessert').innerText = "حلويات";
                document.getElementById('cat-hot').innerText = "مشروبات ساخنة";
                document.getElementById('cat-cold').innerText = "مشروبات باردة";
            } else if(lang === 'en') {
                title.innerText = "Qadash Restaurant";
                call.innerText = "Call to Order:";
                document.getElementById('cat-all').innerText = "All";
                document.getElementById('cat-home').innerText = "Home Food";
                document.getElementById('cat-dessert').innerText = "Desserts";
                document.getElementById('cat-hot').innerText = "Hot Drinks";
                document.getElementById('cat-cold').innerText = "Cold Drinks";
            } else {
                title.innerText = "خارنگەها قەدش";
                call.innerText = "بۆ داواکرنێ تەلەفۆنێ بکە:";
                document.getElementById('cat-all').innerText = "هەمی";
                document.getElementById('cat-home').innerText = "خارنێن مالێ";
                document.getElementById('cat-dessert').innerText = "شرینی";
                document.getElementById('cat-hot').innerText = "ڤەخوارنێن گەرم";
                document.getElementById('cat-cold').innerText = "ڤەخوارنێن سار";
            }
            document.querySelectorAll('.food-name').forEach(f => f.innerText = f.dataset[lang]);
            checkStatus();
        }

        setInterval(checkStatus, 60000);
        checkStatus();
    </script>
</body>
</html>
