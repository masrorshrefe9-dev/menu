<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مەتعه‌مێ قادش</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #ffcc00; }
        h1 { color: #ffcc00; }
        .item { background: #1e1e1e; margin: 15px 0; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .price { background: #ffcc00; color: #000; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍔 مەتعه‌مێ قادش</h1>
        <p>خارنێن خۆش و پاقژ ل قادشێ</p>
    </div>
    <div class="item">
        <div><h3>بۆڕگەر کلاسیک</h3><p>گۆشتێ فرێش، پەنیر، سۆس</p></div>
        <div class="price">5,000 IQD</div>
    </div>
    <div class="item">
        <div><h3>پیتزا مارگێریتا</h3><p>سۆسا تەماتێ، مۆزارێلا</p></div>
        <div class="price">8,000 IQD</div>
    </div>
    <p style="text-align:center; color:#777; margin-top: 50px;">🛡️ دیزاین کراوە لایەن مەسروور</p>
</body>
</html>
