<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مەتعەما قەدش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ffcc00; --bg: #0b0b0b; --card: #161616; }
        body { background-color: var(--bg); color: white; font-family: 'Tahoma', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        
        /* Language Bar */
        .lang-bar { background: #000; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 2000; }
        .lang-btn { background: var(--card); border: 1px solid var(--main); color: var(--main); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--main); color: black; }

        /* Header */
        .header { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1000'); background-size: cover; border-bottom: 4px solid var(--main); }
        h1 { font-size: 3rem; color: var(--main); margin: 10px 0; }

        /* Categories Nav */
        .nav-scroll { background: #111; padding: 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid #222; justify-content: center; }
        .cat-item { background: var(--card); border: 1px solid #333; color: white; padding: 12px 25px; border-radius: 30px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; }
        .cat-item.active { background: var(--main); color: black; border-color: var(--main); }

        /* Grid */
        .container { padding: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #252525; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .img-box { height: 220px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price { position: absolute; top: 10px; left: 10px; background: var(--main); color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .info { padding: 15px; text-align: center; }
        .info h3 { color: var(--main); margin: 0; font-size: 1.4rem; }
        .btn { width: 100%; background: transparent; border: 2px solid var(--main); color: var(--main); padding: 10px; border-radius: 12px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        .footer { text-align: center; padding: 40px; color: #666; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn active" id="btn-ku" onclick="changeLang('ku')">کوردی</button>
        <button class="lang-btn" id="btn-ar" onclick="changeLang('ar')">عربي</button>
        <button class="lang-btn" id="btn-en" onclick="changeLang('en')">English</button>
    </div>

    <div class="header">
        <h1 id="main-title">مەتعەما قەدش</h1>
        <p id="subtitle">🛡️ ب سەرپەرشتیا مەسروور شریفی 🛡️</p>
    </div>

    <div class="nav-scroll">
        <div class="cat-item active" id="cat-all" onclick="filter('all')">هەمی</div>
        <div class="cat-item" id="cat-tazyati" onclick="filter('tazyati')">تەزیاتی</div>
        <div class="cat-item" id="cat-pizza" onclick="filter('pizza')">پیتزا</div>
        <div class="cat-item" id="cat-burger" onclick="filter('burger')">بۆڕگەر</div>
    </div>

    <div class="container" id="menu-grid">
        <div class="card" data-type="burger">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"><div class="price">7,500 IQD</div></div>
            <div class="info"><h3 class="food-name" data-ku="بۆڕگەر کلاسیک" data-ar="برجر كلاسيك" data-en="Classic Burger">بۆڕگەر کلاسیک</h3><button class="btn order-text">داوا بکە</button></div>
        </div>
        <div class="card" data-type="pizza">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500"><div class="price">10,000 IQD</div></div>
            <div class="info"><h3 class="food-name" data-ku="پیتزا مارگێریتا" data-ar="بيتزا مارغريتا" data-en="Pizza Margherita">پیتزا مارگێریتا</h3><button class="btn order-text">داوا بکە</button></div>
        </div>
        <div class="card" data-type="tazyati">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1544145945-f904253d0c71?w=500"><div class="price">1,000 IQD</div></div>
            <div class="info"><h3 class="food-name" data-ku="کۆکا کۆلا" data-ar="كوكا كولا" data-en="Coca Cola">کۆکا کۆلا</h3><button class="btn order-text">داوا بکە</button></div>
        </div>
        <div class="card" data-type="tazyati">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=500"><div class="price">3,500 IQD</div></div>
            <div class="info"><h3 class="food-name" data-ku="ئایس کریم" data-ar="ايس كريم" data-en="Ice Cream">ئایس کریم</h3><button class="btn order-text">داوا بکە</button></div>
        </div>
    </div>

    <div class="footer" id="footer-text">
        ب شانازی ڤە هاتیە دروستکرن ژ لایێ Masror Tech 🛡️
    </div>

    <script>
        function filter(type) {
            const cards = document.querySelectorAll('.card');
            const items = document.querySelectorAll('.cat-item');
            items.forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            cards.forEach(card => {
                if(type === 'all' || card.getAttribute('data-type') === type) card.style.display = 'block';
                else card.style.display = 'none';
            });
        }

        function changeLang(lang) {
            const title = document.getElementById('main-title');
            const sub = document.getElementById('subtitle');
            const footer = document.getElementById('footer-text');
            const orderBtns = document.querySelectorAll('.order-text');
            const foodNames = document.querySelectorAll('.food-name');
            
            // Buttons Highlight
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');

            if(lang === 'ar') {
                document.body.dir = "rtl";
                title.innerText = "مطعم قدش";
                sub.innerText = "🛡️ بإشراف مسرور شريفي 🛡️";
                footer.innerText = "تم الصنع بكل فخر بواسطة Masror Tech 🛡️";
                document.getElementById('cat-all').innerText = "الكل";
                document.getElementById('cat-tazyati').innerText = "مقبلات";
                document.getElementById('cat-pizza').innerText = "بيتزا";
                document.getElementById('cat-burger').innerText = "برجر";
                orderBtns.forEach(b => b.innerText = "اطلب الآن");
            } else if(lang === 'en') {
                document.body.dir = "ltr";
                title.innerText = "Qadash Restaurant";
                sub.innerText = "🛡️ Supervised by Masror Sharifi 🛡️";
                footer.innerText = "Proudly Created By Masror Tech 🛡️";
                document.getElementById('cat-all').innerText = "All";
                document.getElementById('cat-tazyati').innerText = "Drinks";
                document.getElementById('cat-pizza').innerText = "Pizza";
                document.getElementById('cat-burger').innerText = "Burger";
                orderBtns.forEach(b => b.innerText = "Order Now");
            } else {
                document.body.dir = "rtl";
                title.innerText = "مەتعەما قەدش";
                sub.innerText = "🛡️ ب سەرپەرشتیا مەسروور شریفی 🛡️";
                footer.innerText = "ب شانازی ڤە هاتیە دروستکرن ژ لایێ Masror Tech 🛡️";
                document.getElementById('cat-all').innerText = "هەمی";
                document.getElementById('cat-tazyati').innerText = "تەزیاتی";
                document.getElementById('cat-pizza').innerText = "پیتزا";
                document.getElementById('cat-burger').innerText = "بۆڕگەر";
                orderBtns.forEach(b => b.innerText = "داوا بکە");
            }

            foodNames.forEach(f => {
                f.innerText = f.getAttribute('data-' + lang);
            });
        }
    </script>
</body>
  </html>
